[build.env]
passthrough = [
    "RUST_BACKTRACE",
    "RUST_LOG",
    "AWS_LC_SYS_CMAKE_BUILDER",
    "CC",
    "CXX",
]

[target.x86_64-unknown-linux-gnu]
pre-build = [
    "apt-get update && apt-get install -y cmake perl clang lld gcc-10 g++-10",
    "update-alternatives --install /usr/bin/gcc gcc /usr/bin/gcc-10 60",
    "update-alternatives --install /usr/bin/g++ g++ /usr/bin/g++-10 60",
]

[target.x86_64-unknown-linux-gnu.env]
passthrough = ["AWS_LC_SYS_CMAKE_BUILDER", "CC", "CXX"]

[target.aarch64-unknown-linux-gnu]
pre-build = [
    "apt-get update && apt-get install -y cmake perl clang lld llvm gcc-10-aarch64-linux-gnu g++-10-aarch64-linux-gnu",
    "update-alternatives --install /usr/bin/aarch64-linux-gnu-gcc aarch64-linux-gnu-gcc /usr/bin/aarch64-linux-gnu-gcc-10 60",
    "update-alternatives --install /usr/bin/aarch64-linux-gnu-g++ aarch64-linux-gnu-g++ /usr/bin/aarch64-linux-gnu-g++-10 60",
]

[target.aarch64-unknown-linux-gnu.env]
passthrough = ["AWS_LC_SYS_CMAKE_BUILDER", "CC", "CXX"]
