<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>one-router Admin</title>
  <!-- Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;600&family=Inter:wght@300;400;500;600;700&display=swap">
  <!-- Tom Select -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/tom-select@2.3.1/dist/css/tom-select.min.css">
  <!-- Flatpickr -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
  <!-- Tippy.js -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/tippy.js@6/dist/tippy.css">
  <!-- App styles -->
  <link rel="stylesheet" href="/admin/assets/app.css">
</head>
<body>

<!-- ============================================================
     AUTH GATE — shown before API key is validated
     ============================================================ -->
<div id="auth-gate" class="auth-gate">
  <div class="auth-card">
    <div class="auth-logo">
      <span class="logo-router">one-router</span>
      <span class="logo-badge">admin</span>
    </div>
    <p class="auth-hint">Enter your master or ephemeral API key to continue.</p>
    <form id="auth-form" autocomplete="off">
      <div class="input-wrap" style="margin-bottom:0.75rem">
        <input
          id="auth-key-input"
          type="password"
          class="auth-input"
          placeholder="sk-..."
          autocomplete="new-password"
          spellcheck="false"
        >
        <button type="button" class="input-action" id="auth-toggle-visibility" aria-label="Toggle key visibility">
          <i class="bi bi-eye"></i>
        </button>
      </div>
    <button type="submit" class="btn btn-primary auth-btn">
      <i class="bi bi-box-arrow-in-right"></i> Sign in
    </button>
    </form>
    <p id="auth-error" class="auth-error" hidden></p>
  </div>
</div>

<!-- ============================================================
     MAIN LAYOUT — shown after authentication
     ============================================================ -->
<div id="app" class="app-layout" hidden>

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-logo">
      <span class="logo-router">one-router</span>
    </div>
    <nav class="sidebar-nav">
      <a class="nav-item" href="#dashboard" data-page="dashboard">
        <i class="bi bi-speedometer2 nav-icon"></i> Dashboard
      </a>
      <a class="nav-item" href="#keys" data-page="keys">
        <i class="bi bi-key nav-icon"></i> API Keys
      </a>
      <a class="nav-item" href="#backends" data-page="backends">
        <i class="bi bi-hdd-stack nav-icon"></i> Backends
      </a>
      <a class="nav-item" href="#mappings" data-page="mappings">
        <i class="bi bi-arrow-left-right nav-icon"></i> Model Maps
      </a>
      <a class="nav-item" href="#usage" data-page="usage">
        <i class="bi bi-bar-chart-line nav-icon"></i> Usage
      </a>
      <a class="nav-item" href="#flags" data-page="flags">
        <i class="bi bi-toggles nav-icon"></i> Flags
      </a>
    </nav>
    <div class="sidebar-footer">
      <span id="sidebar-version" class="sidebar-version">v—</span>
      <button class="btn-ghost sign-out-btn" id="sign-out-btn">
        <i class="bi bi-box-arrow-right"></i> Sign out
      </button>
    </div>
  </aside>

  <!-- Main content area -->
  <main class="main-content">
    <div id="page-content" class="page-content">
      <!-- Rendered by app.js -->
    </div>
  </main>

</div>

<!-- ============================================================
     MODAL — shared modal overlay
     ============================================================ -->
<div id="modal-overlay" class="modal-overlay" hidden>
  <div class="modal" id="modal-box" role="dialog" aria-modal="true">
    <div class="modal-header">
      <h3 class="modal-title" id="modal-title"></h3>
      <button class="modal-close" id="modal-close" aria-label="Close dialog"><i class="bi bi-x-lg"></i></button>
    </div>
    <div class="modal-body" id="modal-body"></div>
    <div class="modal-footer" id="modal-footer"></div>
  </div>
</div>

<!-- ============================================================
     TOAST — transient notification
     ============================================================ -->
<div id="toast" class="toast" role="status" aria-live="polite" hidden></div>

<!-- Third-party JS (before app.js) -->
<script src="https://cdn.jsdelivr.net/npm/tom-select@2.3.1/dist/js/tom-select.complete.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
<script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2/dist/umd/popper.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/tippy.js@6/dist/tippy-bundle.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="/admin/assets/app.js"></script>
</body>
</html>
