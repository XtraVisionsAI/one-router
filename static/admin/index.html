<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>one-router Admin</title>
  <link rel="stylesheet" href="/admin/assets/app.css">
</head>
<body>

<!-- ============================================================
     AUTH GATE — shown before API key is validated
     ============================================================ -->
<div id="auth-gate" class="auth-gate">
  <div class="auth-card">
    <div class="auth-logo">
      <span class="logo-one">one</span><span class="logo-router">-router</span>
      <span class="logo-badge">admin</span>
    </div>
    <p class="auth-hint">Enter your master or ephemeral API key to continue.</p>
    <form id="auth-form" autocomplete="off">
      <input
        id="auth-key-input"
        type="password"
        class="auth-input"
        placeholder="sk-..."
        autocomplete="new-password"
        spellcheck="false"
      >
      <button type="submit" class="btn btn-primary auth-btn">Sign in</button>
    </form>
    <p id="auth-error" class="auth-error" hidden></p>
  </div>
</div>

<!-- ============================================================
     MAIN LAYOUT — shown after authentication
     ============================================================ -->
<div id="app" class="app-layout" hidden>

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-logo">
      <span class="logo-one">one</span><span class="logo-router">-router</span>
    </div>
    <nav class="sidebar-nav">
      <a class="nav-item" href="#dashboard" data-page="dashboard">
        <span class="nav-icon">⬡</span> Dashboard
      </a>
      <a class="nav-item" href="#keys" data-page="keys">
        <span class="nav-icon">⚿</span> API Keys
      </a>
      <a class="nav-item" href="#backends" data-page="backends">
        <span class="nav-icon">⚡</span> Backends
      </a>
      <a class="nav-item" href="#mappings" data-page="mappings">
        <span class="nav-icon">⇄</span> Model Maps
      </a>
      <a class="nav-item" href="#usage" data-page="usage">
        <span class="nav-icon">◈</span> Usage
      </a>
      <a class="nav-item" href="#flags" data-page="flags">
        <span class="nav-icon">⚑</span> Flags
      </a>
    </nav>
    <div class="sidebar-footer">
      <span id="sidebar-version" class="sidebar-version">v—</span>
      <button class="btn-ghost sign-out-btn" id="sign-out-btn">Sign out</button>
    </div>
  </aside>

  <!-- Main content area -->
  <main class="main-content">
    <div id="page-content" class="page-content">
      <!-- Rendered by app.js -->
    </div>
  </main>

</div>

<!-- ============================================================
     MODAL — shared modal overlay
     ============================================================ -->
<div id="modal-overlay" class="modal-overlay" hidden>
  <div class="modal" id="modal-box" role="dialog" aria-modal="true">
    <div class="modal-header">
      <h3 class="modal-title" id="modal-title"></h3>
      <button class="modal-close" id="modal-close" aria-label="Close">✕</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
    <div class="modal-footer" id="modal-footer"></div>
  </div>
</div>

<!-- ============================================================
     TOAST — transient notification
     ============================================================ -->
<div id="toast" class="toast" hidden></div>

<script src="/admin/assets/app.js"></script>
</body>
</html>
